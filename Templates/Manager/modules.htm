<title>RashCMS:: Módulos :: [module_name]</title>
<script>
var CurrentStep = 1;
function SetCurrent(val)
{

	 if(CurrentStep!=val)
	 {
	 gi('div_'+CurrentStep).style.display = 'none';
	 gi('a_title_'+CurrentStep).className = '';
	 gi('div_'+val).style.display = 'block';
	 gi('a_title_'+val).className = 'current';
	 }
	CurrentStep = val;
	if(val == 2)
	connect('pages/listbacks.php',"r",'ajax_tabs_1_content',loadingt,'');

}
function Mform(action){
hideid("editing_area");
connect('pages/backup.php',"task=new",'ajax_tabs_0_content',loadingt,'');
}
function delback(id){
hideid("editing_area");
var msg = "¿Seguro que quieres eliminar esta copia?\nEsta acción no se puede deshacer.";
if(confirm(msg))
{
connect('pages/backup.php',"task=del&id="+id,'ajax_tabs_1_content_1',loadingt,'delete_back');
}
}
function restore(id){
var msg = "¿Seguro que quieres restaurar esta copia?\nLos datos actuales serán reemplazados. Se recomienda crear una copia antes de continuar.";

if(confirm(msg))
{
connect('pages/backup.php',"task=doback&id="+id,'ajax_tabs_1_content_1',loadingt,'');
}

}
function dl(id)
{
gi("id").value = id;
document.rezashfrm.submit() ;
gv('ajax_tabs_1_content_1') = loadingt;
}
</script>
